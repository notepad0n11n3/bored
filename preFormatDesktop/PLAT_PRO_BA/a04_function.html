<html>
<head>
	<meta charset="utf-8"/>
	<tittle> Piedra , Papel o Tijera </tittle>
	<script>

		function aleatorio(min, max){
			return Math.floor( Math.random() * (max - min + 1) + min)
		}

		function eleccion(jugada){
			let resultado=""

			if (jugada == 1){
				resultado = "Piedra"
			} else if (jugada == 2){
				resultado = "Papel"
			} else if (jugada == 3){
				resultado = "Tijera"
			} else {
				resultado = "Elegiste PERDER"
			}

			return resultado
		}

		// 1 piedra, 2  papel, 3 tijera
		let jugador = 0
		//let min = 1 //let max = 3
		let pc = 0
		let triunfos = 0
		let perdidas = 0

		while( triunfos < 3 && perdidas < 3){
			pc = aleatorio(1,3)
			
			jugador = prompt("Elige: 1 piedra, 2 papel, 3 tijera: ")

			alert("Tu elegiste:: " + eleccion(jugador))
			alert("Pc elige:: " + eleccion(pc))

			//		FIGHT						1 piedra		2 papel		3 tijera
			if(pc == jugador){
				alert("...EMPATE")
			} else if( jugador == 1 && pc == 3){
				alert("...GANASTE")
				triunfos = triunfos + 1
			} else if( jugador == 2 && pc == 1){
				alert("...GANASTE")
				triunfos = triunfos + 1
			} else if( jugador == 3 && pc == 2){
				alert("...GANASTE")
				triunfos = triunfos + 1
			} else {
				alert("...PERDISTE")
				perdidas = perdidas + 1
			}
		}

		alert(":::   GANASTE " + triunfos + "veces. Perdiste " + perdidas + "  :::")

	</script>
</head>
<body>
	<h1> Piedra, Papel, Tijera </h1>
</body>
</html>
